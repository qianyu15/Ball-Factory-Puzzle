<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Ball Factory Puzzle</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            background: #111827;
            font-family: system-ui, sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: crosshair;
        }

        .tool {
            user-select: none;
            cursor: grab;
        }

        .tool:active {
            cursor: grabbing;
        }

        .stage-btn {
            min-width: 42px;
        }

        .stage-btn.locked {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .stage-btn.current {
            box-shadow: 0 0 0 2px white;
        }

        .stage-btn.cleared {
            background: #15803d;
        }
    </style>
</head>

<body class="text-white">

    <!-- UI -->
    <div id="ui"
        class="fixed top-0 left-0 right-0 z-10 bg-gray-900/95 border-b border-gray-700">

        <div class="flex items-center justify-between px-4 py-3 gap-3">

            <div>
                <h1 class="font-bold text-lg">
                    ⚙️ Ball Factory Puzzle
                </h1>

                <p id="stageTitle"
                    class="text-xs text-gray-400">
                    ステージ 1
                </p>
            </div>

            <div class="flex gap-2">

                <button id="startBtn"
                    class="px-4 py-2 rounded-lg bg-green-600 hover:bg-green-500 font-bold">
                    ▶ スタート
                </button>

                <button id="resetBtn"
                    class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600">
                    ↻ リセット
                </button>

            </div>

        </div>

        <!-- Stage Select -->
        <div class="flex gap-2 px-4 pb-3 overflow-x-auto">

            <div id="stageButtons"
                class="flex gap-2">
            </div>

        </div>

        <!-- Tools -->
        <div class="flex gap-2 px-4 pb-3 overflow-x-auto">

            <button
                class="tool bg-blue-700 px-3 py-2 rounded-lg ring-2 ring-white"
                data-type="ramp">
                🟦 坂道
            </button>

            <button
                class="tool bg-gray-700 px-3 py-2 rounded-lg"
                data-type="wall">
                🧱 壁
            </button>

            <button
                class="tool bg-yellow-700 px-3 py-2 rounded-lg"
                data-type="spring">
                🟡 バネ
            </button>

            <button
                class="tool bg-purple-700 px-3 py-2 rounded-lg"
                data-type="spinner">
                🌀 回転ゲート
            </button>

            <button
                class="tool bg-red-700 px-3 py-2 rounded-lg"
                data-type="eraser">
                🗑 削除
            </button>

        </div>

    </div>


    <!-- Canvas -->
    <canvas id="game"></canvas>


    <!-- Message -->
    <div id="message"
        class="fixed bottom-6 left-1/2 -translate-x-1/2
               bg-black/80 px-5 py-3 rounded-xl
               text-center font-bold pointer-events-none">

        装置を配置して「スタート」
    </div>


    <script>

        // =====================================================
        // Canvas
        // =====================================================

        const canvas =
            document.getElementById("game");

        const ctx =
            canvas.getContext("2d");

        let W = 0;
        let H = 0;
        let dpr = 1;


        // =====================================================
        // Game State
        // =====================================================

        let running = false;
        let won = false;

        let currentStage = 1;

        let selectedTool = "ramp";

        let objects = [];

        let clearedStages =
            JSON.parse(
                localStorage.getItem(
                    "ballFactoryClearedStages"
                ) || "[]"
            );


        // =====================================================
        // Physics
        // =====================================================

        const gravity = 0.45;
        const friction = 0.985;


        // =====================================================
        // Ball
        // =====================================================

        const ball = {

            x: 110,
            y: 180,

            vx: 0,
            vy: 0,

            r: 16

        };


        // =====================================================
        // Goal
        // =====================================================

        const goal = {

            x: 0,
            y: 0,

            r: 30

        };


        // =====================================================
        // Stage Data
        // =====================================================

        const stages = [

            {
                name: "はじめの一歩",
                maxObjects: 5,

                ball: {
                    x: 110,
                    y: 180
                },

                goal: {
                    x: 100,
                    y: 100
                },

                objects: [

                    {
                        type: "ramp",
                        x: 350,
                        y: 350,
                        w: 180,
                        h: 25,
                        angle: -0.35
                    }

                ]

            },

            {
                name: "壁を越えろ",
                maxObjects: 4,

                ball: {
                    x: 100,
                    y: 200
                },

                goal: {
                    x: 800,
                    y: 250
                },

                objects: [

                    {
                        type: "wall",
                        x: 400,
                        y: 400,
                        w: 180,
                        h: 25,
                        angle: 0
                    }

                ]

            },

            {
                name: "バネの力",
                maxObjects: 4,

                ball: {
                    x: 120,
                    y: 300
                },

                goal: {
                    x: 850,
                    y: 150
                },

                objects: [

                    {
                        type: "spring",
                        x: 450,
                        y: 450,
                        r: 28
                    }

                ]

            },

            {
                name: "回転ゲート",
                maxObjects: 5,

                ball: {
                    x: 100,
                    y: 150
                },

                goal: {
                    x: 850,
                    y: 500
                },

                objects: [

                    {
                        type: "spinner",
                        x: 500,
                        y: 350,
                        r: 60,
                        angle: 0
                    }

                ]

            },

            {
                name: "空中ルート",
                maxObjects: 6,

                ball: {
                    x: 100,
                    y: 180
                },

                goal: {
                    x: 850,
                    y: 180
                },

                objects: [

                    {
                        type: "wall",
                        x: 350,
                        y: 400,
                        w: 200,
                        h: 25,
                        angle: 0
                    },

                    {
                        type: "wall",
                        x: 650,
                        y: 300,
                        w: 200,
                        h: 25,
                        angle: 0
                    }

                ]

            },

            {
                name: "バネ連鎖",
                maxObjects: 6,

                ball: {
                    x: 100,
                    y: 500
                },

                goal: {
                    x: 850,
                    y: 120
                },

                objects: [

                    {
                        type: "spring",
                        x: 350,
                        y: 400,
                        r: 28
                    },

                    {
                        type: "spring",
                        x: 650,
                        y: 250,
                        r: 28
                    }

                ]

            },

            {
                name: "回転する迷路",
                maxObjects: 7,

                ball: {
                    x: 100,
                    y: 200
                },

                goal: {
                    x: 850,
                    y: 500
                },

                objects: [

                    {
                        type: "spinner",
                        x: 350,
                        y: 300,
                        r: 60,
                        angle: 0
                    },

                    {
                        type: "spinner",
                        x: 650,
                        y: 400,
                        r: 60,
                        angle: 0
                    }

                ]

            },

            {
                name: "工場の迷路",
                maxObjects: 8,

                ball: {
                    x: 100,
                    y: 500
                },

                goal: {
                    x: 850,
                    y: 150
                },

                objects: [

                    {
                        type: "wall",
                        x: 300,
                        y: 350,
                        w: 200,
                        h: 25,
                        angle: 0
                    },

                    {
                        type: "wall",
                        x: 600,
                        y: 250,
                        w: 200,
                        h: 25,
                        angle: 0
                    },

                    {
                        type: "spring",
                        x: 450,
                        y: 500,
                        r: 28
                    }

                ]

            },

            {
                name: "最終試験",
                maxObjects: 10,

                ball: {
                    x: 100,
                    y: 500
                },

                goal: {
                    x: 850,
                    y: 120
                },

                objects: [

                    {
                        type: "wall",
                        x: 300,
                        y: 400,
                        w: 200,
                        h: 25,
                        angle: 0
                    },

                    {
                        type: "spinner",
                        x: 500,
                        y: 300,
                        r: 60,
                        angle: 0
                    },

                    {
                        type: "spring",
                        x: 700,
                        y: 200,
                        r: 28
                    }

                ]

            },

            {
                name: "🏆 マスター工場",
                maxObjects: 12,

                ball: {
                    x: 100,
                    y: 500
                },

                goal: {
                    x: 850,
                    y: 100
                },

                objects: [

                    {
                        type: "spinner",
                        x: 300,
                        y: 350,
                        r: 60,
                        angle: 0
                    },

                    {
                        type: "spring",
                        x: 500,
                        y: 400,
                        r: 28
                    },

                    {
                        type: "wall",
                        x: 700,
                        y: 250,
                        w: 200,
                        h: 25,
                        angle: 0
                    }

                ]

            }

        ];


        // =====================================================
        // Resize
        // =====================================================

        function resize() {

            const rect =
                canvas.getBoundingClientRect();

            W = rect.width;
            H = rect.height;

            dpr =
                Math.max(
                    1,
                    Math.min(
                        window.devicePixelRatio || 1,
                        2
                    )
                );

            canvas.width =
                Math.round(W * dpr);

            canvas.height =
                Math.round(H * dpr);

            ctx.setTransform(
                dpr,
                0,
                0,
                dpr,
                0,
                0
            );

            updateStagePositions();

        }


        const resizeObserver =
            new ResizeObserver(() => {

                resize();

            });

        resizeObserver.observe(canvas);

        resize();


        // =====================================================
        // Stage Position
        // =====================================================

        function updateStagePositions() {

            const stage =
                stages[currentStage - 1];

            if (!stage) {
                return;
            }

            /*
             * ステージデータを画面サイズに合わせる
             *
             * 基準サイズは 1000 x 700
             */
            const scaleX =
                W / 1000;

            const scaleY =
                Math.max(
                    (H - 70) / 630,
                    0.5
                );

            ball.x =
                Math.min(
                    stage.ball.x * scaleX,
                    W - ball.r - 10
                );

            ball.y =
                70 +
                stage.ball.y * scaleY;

            goal.x =
                Math.min(
                    stage.goal.x * scaleX,
                    W - goal.r - 10
                );

            goal.y =
                70 +
                stage.goal.y * scaleY;

        }


        // =====================================================
        // Stage Loading
        // =====================================================

        function loadStage(stageNumber) {

            currentStage =
                stageNumber;

            running = false;
            won = false;

            const stage =
                stages[currentStage - 1];

            objects =
                stage.objects.map(obj => ({
                    ...obj
                }));

            updateStagePositions();

            document
                .getElementById("stageTitle")
                .textContent =
                `ステージ ${currentStage}: ${stage.name}`;

            document
                .getElementById("message")
                .textContent =
                `ステージ ${currentStage}「${stage.name}」 装置を配置してスタート`;

            renderStageButtons();

        }


        // =====================================================
        // Stage Buttons
        // =====================================================

        function renderStageButtons() {

            const container =
                document.getElementById(
                    "stageButtons"
                );

            container.innerHTML = "";

            for (
                let i = 1;
                i <= stages.length;
                i++
            ) {

                const button =
                    document.createElement(
                        "button"
                    );

                const unlocked =
                    i === 1 ||
                    clearedStages.includes(i - 1);

                const cleared =
                    clearedStages.includes(i);

                button.textContent =
                    unlocked
                        ? cleared
                            ? `✓ ${i}`
                            : i
                        : `🔒 ${i}`;

                button.className =
                    "stage-btn px-3 py-2 rounded-lg font-bold " +
                    "bg-gray-700 hover:bg-gray-600";

                if (cleared) {

                    button.classList.add(
                        "cleared"
                    );

                }

                if (i === currentStage) {

                    button.classList.add(
                        "current"
                    );

                }

                if (!unlocked) {

                    button.classList.add(
                        "locked"
                    );

                    button.disabled = true;

                }

                button.addEventListener(
                    "click",
                    () => {

                        loadStage(i);

                    }
                );

                container.appendChild(
                    button
                );

            }

        }


        // =====================================================
        // Tool Selection
        // =====================================================

        document
            .querySelectorAll(".tool")
            .forEach(button => {

                button.addEventListener(
                    "click",
                    () => {

                        selectedTool =
                            button.dataset.type;

                        document
                            .querySelectorAll(".tool")
                            .forEach(btn => {

                                btn.classList.remove(
                                    "ring-2",
                                    "ring-white"
                                );

                            });

                        button.classList.add(
                            "ring-2",
                            "ring-white"
                        );

                    }
                );

            });


        // =====================================================
        // Pointer Position
        // =====================================================

        function getPointerPosition(e) {

            const rect =
                canvas.getBoundingClientRect();

            return {

                x:
                    (e.clientX - rect.left)
                    * (W / rect.width),

                y:
                    (e.clientY - rect.top)
                    * (H / rect.height)

            };

        }


        // =====================================================
        // Object Placement
        // =====================================================

        canvas.addEventListener(
            "pointerdown",
            e => {

                if (running) {
                    return;
                }

                const stage =
                    stages[currentStage - 1];

                const placedObjects =
                    objects.length -
                    stage.objects.length;

                if (
                    selectedTool !== "eraser" &&
                    placedObjects >= stage.maxObjects
                ) {

                    document
                        .getElementById("message")
                        .textContent =
                        `このステージでは追加できる装置は${stage.maxObjects}個までです`;

                    return;

                }

                const {

                    x,
                    y

                } =
                    getPointerPosition(e);


                if (
                    selectedTool === "eraser"
                ) {

                    removeObject(
                        x,
                        y
                    );

                    return;

                }


                if (
                    selectedTool === "ramp"
                ) {

                    objects.push({

                        type: "ramp",

                        x,
                        y,

                        w: 180,
                        h: 25,

                        angle: -0.35

                    });

                }


                if (
                    selectedTool === "wall"
                ) {

                    objects.push({

                        type: "wall",

                        x,
                        y,

                        w: 150,
                        h: 25,

                        angle: 0

                    });

                }


                if (
                    selectedTool === "spring"
                ) {

                    objects.push({

                        type: "spring",

                        x,
                        y,

                        r: 28

                    });

                }


                if (
                    selectedTool === "spinner"
                ) {

                    objects.push({

                        type: "spinner",

                        x,
                        y,

                        r: 60,

                        angle: 0

                    });

                }

            }
        );


        // =====================================================
        // Remove Object
        // =====================================================

        function removeObject(x, y) {

            objects =
                objects.filter(obj => {

                    if (
                        obj.type === "spring" ||
                        obj.type === "spinner"
                    ) {

                        return (
                            Math.hypot(
                                x - obj.x,
                                y - obj.y
                            )
                            >
                            obj.r + 20
                        );

                    }

                    return !(
                        x >
                        obj.x - obj.w / 2 &&

                        x <
                        obj.x + obj.w / 2 &&

                        y >
                        obj.y - obj.h / 2 &&

                        y <
                        obj.y + obj.h / 2
                    );

                });

        }


        // =====================================================
        // Start
        // =====================================================

        document
            .getElementById("startBtn")
            .addEventListener(
                "click",
                () => {

                    if (running) {
                        return;
                    }

                    running = true;
                    won = false;

                    const stage =
                        stages[currentStage - 1];

                    updateStagePositions();

                    ball.vx = 1;
                    ball.vy = 0;

                    document
                        .getElementById("message")
                        .textContent =
                        "ボールが動き始めた！";

                }
            );


        // =====================================================
        // Reset
        // =====================================================

        document
            .getElementById("resetBtn")
            .addEventListener(
                "click",
                () => {

                    loadStage(
                        currentStage
                    );

                }
            );


        // =====================================================
        // Next Stage
        // =====================================================

        function nextStage() {

            if (
                currentStage >= stages.length
            ) {

                document
                    .getElementById("message")
                    .textContent =
                    "🏆 全ステージクリア！";

                return;

            }

            loadStage(
                currentStage + 1
            );

        }


        // =====================================================
        // Physics Update
        // =====================================================

        function update() {

            if (
                !running ||
                won
            ) {

                return;

            }


            ball.vy += gravity;


            ball.x += ball.vx;
            ball.y += ball.vy;


            ball.vx *= friction;


            /*
             * Left wall
             */
            if (
                ball.x - ball.r < 0
            ) {

                ball.x =
                    ball.r;

                ball.vx *= -0.7;

            }


            /*
             * Right wall
             */
            if (
                ball.x + ball.r > W
            ) {

                ball.x =
                    W - ball.r;

                ball.vx *= -0.7;

            }


            /*
             * Top wall
             */
            if (
                ball.y - ball.r < 70
            ) {

                ball.y =
                    70 + ball.r;

                ball.vy *= -0.7;

            }


            /*
             * Bottom wall
             */
            if (
                ball.y + ball.r > H
            ) {

                ball.y =
                    H - ball.r;

                ball.vy *= -0.65;

                ball.vx *= 0.9;

            }


            /*
             * Objects
             */
            for (
                const obj of objects
            ) {

                if (
                    obj.type === "ramp"
                ) {

                    collideRamp(
                        obj
                    );

                }

                if (
                    obj.type === "wall"
                ) {

                    collideWall(
                        obj
                    );

                }

                if (
                    obj.type === "spring"
                ) {

                    collideSpring(
                        obj
                    );

                }

                if (
                    obj.type === "spinner"
                ) {

                    collideSpinner(
                        obj
                    );

                }

            }


            /*
             * Goal
             */
            const distance =
                Math.hypot(
                    ball.x - goal.x,
                    ball.y - goal.y
                );


            if (
                distance <
                goal.r - ball.r / 2
            ) {

                winStage();

            }

        }


        // =====================================================
        // Win Stage
        // =====================================================

        function winStage() {

            won = true;
            running = false;

            if (
                !clearedStages.includes(
                    currentStage
                )
            ) {

                clearedStages.push(
                    currentStage
                );

                localStorage.setItem(
                    "ballFactoryClearedStages",
                    JSON.stringify(
                        clearedStages
                    )
                );

            }

            renderStageButtons();

            const message =
                document.getElementById(
                    "message"
                );

            if (
                currentStage <
                stages.length
            ) {

                message.innerHTML =
                    `🎉 ステージ ${currentStage} クリア！<br>
                    <button
                        id="nextStageBtn"
                        class="mt-2 px-4 py-2 rounded-lg bg-green-600 hover:bg-green-500">
                        次のステージ →
                    </button>`;

                document
                    .getElementById(
                        "nextStageBtn"
                    )
                    .addEventListener(
                        "click",
                        nextStage
                    );

            } else {

                message.textContent =
                    "🏆 全ステージクリア！";

            }

        }


        // =====================================================
        // Ramp Collision
        // =====================================================

        function collideRamp(obj) {

            const dx =
                Math.cos(obj.angle);

            const dy =
                Math.sin(obj.angle);

            const px =
                ball.x - obj.x;

            const py =
                ball.y - obj.y;

            const along =
                px * dx +
                py * dy;

            const normal =
                -px * dy +
                py * dx;

            if (

                Math.abs(along)
                <
                obj.w / 2

                &&

                normal
                >
                -ball.r

                &&

                normal
                <
                ball.r + obj.h

            ) {

                const slopeY =
                    obj.y
                    +
                    Math.sin(
                        obj.angle
                    )
                    *
                    along;

                if (
                    ball.y >
                    slopeY - ball.r
                ) {

                    ball.y =
                        slopeY - ball.r;

                    ball.vy *= -0.15;

                    ball.vx +=
                        Math.sin(
                            obj.angle
                        )
                        *
                        0.25;

                    ball.vy +=
                        Math.cos(
                            obj.angle
                        )
                        *
                        0.1;

                }

            }

        }


        // =====================================================
        // Wall Collision
        // =====================================================

        function collideWall(obj) {

            const left =
                obj.x - obj.w / 2;

            const right =
                obj.x + obj.w / 2;

            const top =
                obj.y - obj.h / 2;

            const bottom =
                obj.y + obj.h / 2;

            const closestX =
                Math.max(
                    left,
                    Math.min(
                        ball.x,
                        right
                    )
                );

            const closestY =
                Math.max(
                    top,
                    Math.min(
                        ball.y,
                        bottom
                    )
                );

            const dx =
                ball.x - closestX;

            const dy =
                ball.y - closestY;

            const distance =
                Math.hypot(
                    dx,
                    dy
                );

            if (
                distance < ball.r
            ) {

                const nx =
                    distance === 0
                        ? 0
                        : dx / distance;

                const ny =
                    distance === 0
                        ? -1
                        : dy / distance;

                ball.x =
                    closestX
                    +
                    nx * ball.r;

                ball.y =
                    closestY
                    +
                    ny * ball.r;

                const dot =
                    ball.vx * nx
                    +
                    ball.vy * ny;

                ball.vx -=
                    1.7
                    *
                    dot
                    *
                    nx;

                ball.vy -=
                    1.7
                    *
                    dot
                    *
                    ny;

                ball.vx *= 0.8;
                ball.vy *= 0.8;

            }

        }


        // =====================================================
        // Spring Collision
        // =====================================================

        function collideSpring(obj) {

            const dx =
                ball.x - obj.x;

            const dy =
                ball.y - obj.y;

            const distance =
                Math.hypot(
                    dx,
                    dy
                );

            if (
                distance <
                obj.r + ball.r
            ) {

                const nx =
                    dx /
                    (
                        distance ||
                        1
                    );

                const ny =
                    dy /
                    (
                        distance ||
                        1
                    );

                ball.x =
                    obj.x
                    +
                    nx
                    *
                    (
                        obj.r +
                        ball.r
                    );

                ball.y =
                    obj.y
                    +
                    ny
                    *
                    (
                        obj.r +
                        ball.r
                    );

                ball.vx =
                    nx * 12;

                ball.vy =
                    ny * 12;

            }

        }


        // =====================================================
        // Spinner Collision
        // =====================================================

        function collideSpinner(obj) {

            obj.angle += 0.04;

            for (
                let i = 0;
                i < 3;
                i++
            ) {

                const angle =
                    obj.angle
                    +
                    i
                    *
                    Math.PI
                    *
                    2
                    /
                    3;

                const endX =
                    obj.x
                    +
                    Math.cos(
                        angle
                    )
                    *
                    obj.r;

                const endY =
                    obj.y
                    +
                    Math.sin(
                        angle
                    )
                    *
                    obj.r;

                const dx =
                    ball.x - endX;

                const dy =
                    ball.y - endY;

                const distance =
                    Math.hypot(
                        dx,
                        dy
                    );

                if (
                    distance <
                    ball.r + 12
                ) {

                    const nx =
                        dx /
                        (
                            distance ||
                            1
                        );

                    const ny =
                        dy /
                        (
                            distance ||
                            1
                        );

                    ball.vx +=
                        nx * 3;

                    ball.vy +=
                        ny * 3;

                }

            }

        }


        // =====================================================
        // Draw
        // =====================================================

        function draw() {

            ctx.clearRect(
                0,
                0,
                W,
                H
            );

            ctx.fillStyle =
                "#111827";

            ctx.fillRect(
                0,
                0,
                W,
                H
            );


            /*
             * Grid
             */
            ctx.strokeStyle =
                "rgba(255,255,255,0.04)";

            ctx.lineWidth = 1;

            for (
                let x = 0;
                x < W;
                x += 40
            ) {

                ctx.beginPath();

                ctx.moveTo(
                    x,
                    70
                );

                ctx.lineTo(
                    x,
                    H
                );

                ctx.stroke();

            }

            for (
                let y = 70;
                y < H;
                y += 40
            ) {

                ctx.beginPath();

                ctx.moveTo(
                    0,
                    y
                );

                ctx.lineTo(
                    W,
                    y
                );

                ctx.stroke();

            }


            drawGoal();


            for (
                const obj of objects
            ) {

                drawObject(
                    obj
                );

            }


            drawBall();

        }


        // =====================================================
        // Goal
        // =====================================================

        function drawGoal() {

            ctx.beginPath();

            ctx.arc(

                goal.x,
                goal.y,
                goal.r,
                0,
                Math.PI * 2

            );

            ctx.fillStyle =
                "rgba(34,197,94,0.25)";

            ctx.fill();

            ctx.strokeStyle =
                "#22c55e";

            ctx.lineWidth = 5;

            ctx.stroke();

            ctx.fillStyle =
                "#86efac";

            ctx.font =
                "bold 14px sans-serif";

            ctx.textAlign =
                "center";

            ctx.fillText(

                "GOAL",

                goal.x,
                goal.y + 5

            );

        }


        // =====================================================
        // Object Drawing
        // =====================================================

        function drawObject(obj) {

            ctx.save();

            ctx.translate(
                obj.x,
                obj.y
            );


            /*
             * Ramp
             */
            if (
                obj.type === "ramp"
            ) {

                ctx.rotate(
                    obj.angle
                );

                ctx.fillStyle =
                    "#3b82f6";

                ctx.fillRect(

                    -obj.w / 2,
                    -obj.h / 2,
                    obj.w,
                    obj.h

                );

                ctx.fillStyle =
                    "rgba(255,255,255,0.3)";

                ctx.fillRect(

                    -obj.w / 2,
                    -obj.h / 2,
                    obj.w,
                    5

                );

            }


            /*
             * Wall
             */
            if (
                obj.type === "wall"
            ) {

                ctx.fillStyle =
                    "#6b7280";

                ctx.fillRect(

                    -obj.w / 2,
                    -obj.h / 2,
                    obj.w,
                    obj.h

                );

                ctx.strokeStyle =
                    "#9ca3af";

                ctx.strokeRect(

                    -obj.w / 2,
                    -obj.h / 2,
                    obj.w,
                    obj.h

                );

            }


            /*
             * Spring
             */
            if (
                obj.type === "spring"
            ) {

                ctx.beginPath();

                ctx.arc(

                    0,
                    0,
                    obj.r,
                    0,
                    Math.PI * 2

                );

                ctx.fillStyle =
                    "#eab308";

                ctx.fill();

                ctx.strokeStyle =
                    "#fef08a";

                ctx.lineWidth = 5;

                ctx.stroke();

                ctx.fillStyle =
                    "#422006";

                ctx.font =
                    "bold 24px sans-serif";

                ctx.textAlign =
                    "center";

                ctx.fillText(
                    "↯",
                    0,
                    8
                );

            }


            /*
             * Spinner
             */
            if (
                obj.type === "spinner"
            ) {

                ctx.strokeStyle =
                    "#a855f7";

                ctx.lineWidth = 12;

                ctx.lineCap =
                    "round";

                for (
                    let i = 0;
                    i < 3;
                    i++
                ) {

                    const angle =
                        obj.angle
                        +
                        i
                        *
                        Math.PI
                        *
                        2
                        /
                        3;

                    ctx.beginPath();

                    ctx.moveTo(
                        0,
                        0
                    );

                    ctx.lineTo(

                        Math.cos(
                            angle
                        )
                        *
                        obj.r,

                        Math.sin(
                            angle
                        )
                        *
                        obj.r

                    );

                    ctx.stroke();

                }

                ctx.beginPath();

                ctx.arc(

                    0,
                    0,
                    14,
                    0,
                    Math.PI * 2

                );

                ctx.fillStyle =
                    "#d8b4fe";

                ctx.fill();

            }


            ctx.restore();

        }


        // =====================================================
        // Ball
        // =====================================================

        function drawBall() {

            ctx.beginPath();

            ctx.arc(

                ball.x,
                ball.y,
                ball.r,
                0,
                Math.PI * 2

            );

            ctx.fillStyle =
                "#f97316";

            ctx.fill();

            ctx.strokeStyle =
                "#fed7aa";

            ctx.lineWidth = 3;

            ctx.stroke();


            ctx.beginPath();

            ctx.arc(

                ball.x - 5,
                ball.y - 5,
                4,
                0,
                Math.PI * 2

            );

            ctx.fillStyle =
                "white";

            ctx.fill();

        }


        // =====================================================
        // Main Loop
        // =====================================================

        function loop() {

            update();

            draw();

            requestAnimationFrame(
                loop
            );

        }


        // =====================================================
        // Start Game
        // =====================================================

        loadStage(1);

        loop();

    </script>

</body>

</html>
